<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC Story</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&family=Montserrat:wght@300;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #000; --text: #fff; --accent: #444; }
        .theme-pink { --bg: #ffe0eb; --text: #c71585; --accent: #ffb6c1; }
        .theme-blue { --bg: #e0f7fa; --text: #006064; --accent: #81d4fa; }

        body { background-color: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; transition: 0.3s; overflow-x: hidden; }
        
        /* لوحة التحكم (تظهر للأدمن فقط) */
        .nav-bar { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); padding: 12px 25px; border-radius: 40px; z-index: 2000; display: none; flex-direction: column; gap: 10px; border: 1px solid #444; align-items: center; width: 90%; max-width: 400px; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        .btn { background: #fff; color: #000; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 0.85rem; transition: 0.2s; }
        
        /* صندوق اللوجن */
        #login-section { display: none; flex-direction: column; background: #111; padding: 40px 30px; border-radius: 25px; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 340px; z-index: 3000; border: 1px solid #333; }
        input { width: 100%; margin: 10px 0; padding: 15px; background: #000; color: #fff; border: 1px solid #444; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }

        #main-wrapper { display: none; opacity: 0; transition: opacity 0.6s ease; padding-bottom: 120px; }

        /* Grid Style */
        #grid-layout { display: none; width: 100%; max-width: 500px; margin: 0 auto; flex-direction: column; }
        .block { width: 100%; position: relative; overflow: hidden; background: #0a0a0a; border-bottom: 2px solid #000; }
        .h-large { height: 260px; } .h-split { height: 360px; } .h-bottom { height: 460px; }
        .block img { width: 100%; height: 100%; object-fit: cover; }
        .row { display: flex; width: 100%; } .row .block { width: 50%; border-right: 2px solid #000; }
        .overlay-text { position: absolute; width: 100%; text-align: center; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        .text-main { bottom: 25px; font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-style: italic; }
        .text-date { top: 35px; font-size: 0.75rem; letter-spacing: 4px; font-weight: 700; }

        /* Stack Style */
        #stack-layout { display: none; height: 100vh; flex-direction: column; align-items: center; padding-top: 40px; overflow: hidden; }
        .image-stack { position: relative; width: 290px; height: 290px; perspective: 1000px; margin-top: 25px; }
        .stack-image { position: absolute; width: 100%; height: 100%; object-fit: cover; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); transition: 0.5s; touch-action: none; border: 4px solid rgba(255,255,255,0.15); }
        #stack-long-story { font-size: 1rem; text-align: center; max-width: 85%; margin-bottom: 25px; max-height: 25vh; overflow-y: auto; line-height: 1.6; }

        .editable { cursor: pointer; }
    </style>
</head>
<body id="body">

    <div id="login-section">
        <h2 style="text-align:center; font-weight:300; margin-bottom:20px; letter-spacing:3px;">ADMIN LOGIN</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" style="width:100%; margin-top:15px; height:55px; font-size:1.1rem;" onclick="login()">Enter Dashboard</button>
    </div>

    <div id="main-wrapper">
        <header style="height: 40px;"></header>
        <div id="grid-layout">
            <div class="block h-large" onclick="adminChangeImg(0)"><img id="g-img0" src=""><div id="g-txt-main" class="overlay-text text-main" onclick="adminEdit(this)">Title</div></div>
            <div class="block h-large" onclick="adminChangeImg(1)"><img id="g-img1" src=""></div>
            <div class="row">
                <div class="block h-split" onclick="adminChangeImg(2)"><img id="g-img2" src=""><div id="g-txt-date" class="overlay-text text-date" onclick="adminEdit(this)">DATE</div></div>
                <div class="block h-split" onclick="adminChangeImg(3)"><img id="g-img3" src=""></div>
            </div>
            <div class="block h-bottom" onclick="adminChangeImg(4)"><img id="g-img4" src=""></div>
        </div>
        <div id="stack-layout">
            <h2 id="s-txt-title" onclick="adminEdit(this)" style="font-family:'Cormorant Garamond';font-size:2.5rem; font-style:italic;"></h2>
            <div id="stack-long-story" onclick="adminEdit(this)"></div>
            <div class="image-stack" id="image-stack"></div>
        </div>
        <div id="admin-nav" class="nav-bar">
            <div style="display:flex; gap:10px;">
                <button class="btn" onclick="switchLayout()">Style 🔄</button>
                <div style="display:flex; gap:5px;" id="theme-dots">
                    <div class="dot" style="width:20px;height:20px;border-radius:50%;background:#000;border:1px solid #fff;" onclick="setTheme('black')"></div>
                    <div class="dot" style="width:20px;height:20px;border-radius:50%;background:#ffb6c1;border:1px solid #fff;" onclick="setTheme('pink')"></div>
                    <div class="dot" style="width:20px;height:20px;border-radius:50%;background:#81d4fa;border:1px solid #fff;" onclick="setTheme('blue')"></div>
                </div>
            </div>
            <button class="btn" style="background:#4caf50; color:#fff; width: 100%;" id="save-btn" onclick="saveAll()">Save Changes ✨</button>
        </div>
    </div>

    <input type="file" id="file-picker" style="display: none;" accept="image/*">

    <script>
        const supabaseUrl = 'https://ojiogstdxenhiojvsygp.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9qaW9nc3RkeGVuaGlvanZzeWdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTU3MzIsImV4cCI6MjA5MTE3MTczMn0.Tp1i9Mq8OmrcprPLS5KUdzvRWnj4dVQF5o3yxrPymxw';
        const _sb = supabase.createClient(supabaseUrl, supabaseKey);

        let pageData = { layout: 'grid', theme: 'black', images: ["","","","",""], gridMain: "Title", gridDate: "DATE", stackTitle: "Our Story", stackStory: "Story here..." };
        let userId = null;
        let isAdmin = false;
        let sIdx = 0;

        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (id) {
                // وضع العرض (View Mode)
                userId = id;
                isAdmin = false;
                await loadAndRender();
            } else {
                // وضع الإدارة (Admin Mode)
                document.getElementById('login-section').style.display = 'flex';
            }
        };

        async function login() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            const { data } = await _sb.from('nfc_users').select('*').eq('username', u).eq('password', p).single();
            if (data) {
                userId = data.id;
                isAdmin = true;
                await loadAndRender();
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('admin-nav').style.display = 'flex';
            } else alert("Invalid Login");
        }

        async function loadAndRender() {
            const { data } = await _sb.from('nfc_users').select('image_url').eq('id', userId).single();
            if (data?.image_url) {
                try { pageData = { ...pageData, ...JSON.parse(data.image_url) }; } catch(e){}
            }
            const wrapper = document.getElementById('main-wrapper');
            wrapper.style.display = 'block';
            setTimeout(() => wrapper.style.opacity = '1', 50);
            render();
        }

        function render() {
            document.getElementById('grid-layout').style.display = pageData.layout === 'grid' ? 'flex' : 'none';
            document.getElementById('stack-layout').style.display = pageData.layout === 'stack' ? 'flex' : 'none';
            setTheme(pageData.theme);
            document.getElementById('g-txt-main').innerText = pageData.gridMain;
            document.getElementById('g-txt-date').innerText = pageData.gridDate;
            document.getElementById('s-txt-title').innerText = pageData.stackTitle;
            document.getElementById('stack-long-story').innerText = pageData.stackStory;

            for(let i=0; i<5; i++){
                const src = pageData.images[i] || 'https://via.placeholder.com/400/111/fff?text=No+Image';
                if(pageData.layout === 'grid') document.getElementById('g-img'+i).src = src;
            }
            if(pageData.layout === 'stack') renderStack();
            
            if(isAdmin) {
                document.querySelectorAll('.overlay-text, #s-txt-title, #stack-long-story').forEach(el => el.classList.add('editable'));
            }
        }

        function renderStack() {
            const container = document.getElementById('image-stack');
            container.innerHTML = '';
            pageData.images.forEach((src, i) => {
                const img = document.createElement('img');
                img.className = 'stack-image';
                img.src = src || 'https://via.placeholder.com/400/111/fff?text=No+Image';
                if(isAdmin) img.onclick = () => { if(img.style.zIndex == "5") adminChangeImg(i); };
                initSwipe(img);
                container.appendChild(img);
            });
            updateStackUI();
        }

        function updateStackUI() {
            const imgs = document.querySelectorAll('.stack-image');
            imgs.forEach((img, i) => {
                const diff = (i - (sIdx % 5) + 5) % 5;
                img.style.zIndex = 5 - diff;
                img.style.transform = `translateY(-${diff * 8}px) scale(${1 - diff * 0.06}) rotate(${diff * -3}deg)`;
                img.style.opacity = diff < 3 ? 1 : 0;
            });
        }

        function initSwipe(img) {
            let startX = 0;
            img.onpointerdown = e => { startX = e.clientX; };
            img.onpointerup = e => {
                const diff = e.clientX - startX;
                if(Math.abs(diff) > 70) {
                    img.style.transition = '0.5s';
                    img.style.transform = `translateX(${diff > 0 ? 600 : -600}px) opacity(0)`;
                    setTimeout(() => { sIdx++; updateStackUI(); }, 200);
                }
                startX = 0;
            };
        }

        // وظائف الأدمن فقط
        function adminEdit(el) { if(isAdmin) { el.contentEditable = true; el.focus(); } }
        function adminChangeImg(i) { if(isAdmin) { curIdx = i; document.getElementById('file-picker').click(); } }
        function switchLayout() { if(isAdmin) { pageData.layout = pageData.layout === 'grid' ? 'stack' : 'grid'; render(); } }
        function setTheme(t) { pageData.theme = t; document.getElementById('body').className = (t === 'black') ? '' : 'theme-' + t; }

        let curIdx = 0;
        document.getElementById('file-picker').onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height, max = 800;
                    if (w > max || h > max) { if (w > h) { h = (h*max)/w; w = max; } else { w = (w*max)/h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    pageData.images[curIdx] = canvas.toDataURL('image/jpeg', 0.6);
                    render();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        async function saveAll() {
            const btn = document.getElementById('save-btn');
            btn.innerText = "Saving...";
            pageData.gridMain = document.getElementById('g-txt-main').innerText;
            pageData.gridDate = document.getElementById('g-txt-date').innerText;
            pageData.stackTitle = document.getElementById('s-txt-title').innerText;
            pageData.stackStory = document.getElementById('stack-long-story').innerText;
            await _sb.from('nfc_users').update({ image_url: JSON.stringify(pageData) }).eq('id', userId);
            btn.innerText = "Saved ✨";
            setTimeout(() => btn.innerText = "Save Changes ✨", 2000);
        }
    </script>
</body>
</html>
